# Fly.io tətbiqi adı
app = "hzt"

# Buildpack təyin edir (Java üçün uyğun buildpack seçilir)
[build]
  builder = "paketobuildpacks/builder:base" # Java Buildpacks

# Prosesləri təyin edirik (web prosesini buraya əlavə edirik)
[[processes]]
  name = "web"
  command = "java -jar build/libs/HZT-0.0.1-SNAPSHOT.jar"

# Fly.io-da işləyən tətbiqin konfiqurasiyası
[[services]]
  http_checks = []
  internal_port = 8080    # Java Spring Boot tətbiqi default portu
  force_https = true      # HTTP