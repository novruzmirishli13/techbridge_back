# Spring application name
spring.application.name=HZT

# Database configuration
# Using Heroku's DATABASE_URL environment variable for production
spring.datasource.url=${DATABASE_URL} 
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres} # Fallback to local username if not found in environment variables
spring.datasource.password=${DATABASE_PASSWORD:novruz1234} # Fallback to local password if not found in environment variables

# Hibernate JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port
server.port=8082
